name: GPSD
description: 24 Run gpsd in a container to expose GPS data over TCP.
version: 0.1.24
slug: gpsd
url: https://github.com/elschnet/ha-addon-gpsd2
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
startup: services
boot: auto
init: false
apparmor: false
host_network: false
ports:
  "2947/tcp": 2947
ports_description:
  "2947/tcp": "gpsd TCP port"
device: /dev/ttyUSB1
udev: true
options:
  device: /dev/ttyUSB1
  baud: 9600
  gpsd_options: "-n"
schema:
  device: str
  baud: int
  gpsd_options: str
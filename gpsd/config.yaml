name: GPSD 
description: 22Run gpsd in a container to expose GPS data over TCP.
version: 0.1.22
slug: gpsd
url: https://github.com/elschnet/ha-addon-gpsd2
arch:
  - aarch64
  - armv7
  - armhf
  - amd64
usb: true
privileged:
  - SYS_RAWIO
  - ALL
startup: services
boot: auto
init: false
host_network: false
ports:
  "2947/tcp": 2947
ports_description:
  "2947/tcp": "gpsd TCP port"
devices:
  - /dev/ttyUSB0
  - /dev/ttyUSB1
  - /dev/ttyUSB2
  - /dev/ttyACM0
  - /dev/ttyACM1
udev: true
options:
  device: /dev/ttyUSB1
  baud: 9600
  gpsd_options: "-n"
schema:
  device: str
  baud: int
  gpsd_options: str